  mimir:
    image: grafana/mimir:3.1.2
    container_name: mimir
    command:
      - -config.file=/etc/mimir/mimir.yaml
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml
      - ./mimir/data/:/data
    ports:
      - "127.0.0.1:9001:9001"
    networks:
      - dockernet
    restart: always
    logging:
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    networks:
      - dockernet
    privileged: true
    ports:
      - "127.0.0.1:8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    logging:
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  tempo:
    image: grafana/tempo:3.0.2
    container_name: tempo
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:Z
      - tempo-storage:/var/tempo:Z
    ports:
      - "127.0.0.1:3200:3200"   # Tempo API
    networks:
      - dockernet
    restart: always
    logging:
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

volumes:
  grafana-storage:
    name: grafana-storage
    external: true
  loki-storage:
    name: loki-storage
    external: true
  tempo-storage:
    name: tempo-storage
    external: true

networks:
  dockernet:
    external: true
