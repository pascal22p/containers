
services:
  carbon-relay-ng:
    image: grafana/carbon-relay-ng:1.5.17
    container_name: carbon-relay-ng
    volumes:
      - ./carbon-relay/etc:/conf:Z
      - ./carbon-relay/log:/var/log:Z
    ports:
      - "127.0.0.1:2003:2003"
      #- "127.0.0.1:3300:8081"
    networks:
      - dockernet
    restart: always
    environment:
      - TZ=Europe/London
      - GRAFANA_NET_USER_ID=${GRAFANA_NET_USER_ID}
      - GRAFANA_NET_API_KEY=${GRAFANA_NET_API_KEY}
      - LOG_LEVEL=info
    logging:
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  graphite:
    container_name: graphite
    image: graphiteapp/graphite-statsd:1.1.10-5

    volumes:
      - ./graphite/storage:/opt/graphite/storage:Z
      - ./graphite/conf:/opt/graphite/conf:Z
      - ./graphite/statsd:/opt/statsd/config:Z
      - ./graphite/log:/var/log:Z
    ports:
      - "127.0.0.1:7000:80"
      #- "127.0.0.1:2003-2014:2003-2004" # direct
      - "127.0.0.1:2013:2003" # carbon-relay
      - "127.0.0.1:2023-2024:2023-2024"
      - "127.0.0.1:8125:8125/udp"
      - "127.0.0.1:8126:8126"
    networks:
      - dockernet
    restart: always
    environment:
      - TZ=Europe/London
      - GOCARBON=1
      - RELAY=0
      - GRAPHITE_WSGI_REQUEST_TIMEOUT=120
      - GRAPHITE_WSGI_THREADS=4
    logging:
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}" 

  loki:
    image: grafana/loki:3.7.2
    container_name: loki
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/loki-config.yml -config.expand-env=true
    networks:
      - dockernet
    volumes:
      - ./loki/conf:/etc/loki:Z
      - loki-storage:/loki:Z
      - ./loki/rules:/etc/loki/rules:Z
    restart: always
    environment:
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET=${S3_SECRET}
      - S3_BUCKET=${S3_BUCKET}
    logging:
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  grafana:
    image: grafana/grafana:13.0.2
    container_name: grafana
    restart: always
    volumes:
      - grafana-storage:/var/lib/grafana:Z
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - dockernet
    environment:
      - GF_LOG_LEVEL=debug
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=grafana.debroglie.net
      - GF_SMTP_ENABLED=true
    logging:
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  alloy:
    container_name: grafana_alloy
    volumes:
      - ./alloy/conf:/etc/alloy:Z
      - ./alloy/data:/var/lib/alloy/data:Z
      - /var/lib/docker/containers:/host/var/lib/docker/containers:Z
      - /home/containers/Abraracourcix/nginx/logs:/host/var/log/nginx:Z
      - /var/log/php-fpm:/host/var/log/php-fpm:Z
      - /var/log/mariadb:/host/var/log/mariadb:Z
      - /var/log/journal:/host/var/log/journal:Z
    environment:
      - LOKI_ID=${LOKI_ID}
      - LOKI_TOKEN=${LOKI_TOKEN}
      - PROM_ID=${PROM_ID}
      - PROM_TOKEN=${PROM_TOKEN}
      - OTEL_ID=${OTEL_ID}
      - OTEL_TOKEN=${OTEL_TOKEN}
    ports:
      - "127.0.0.1:9999:9999"
      - "127.0.0.1:9009:9009"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:4317:4317"
    image: grafana/alloy:v1.17.0
    command: 'run --server.http.listen-addr=0.0.0.0:9999 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy'
    networks:
      - dockernet
    restart: always
    logging:
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

